<style>
*{box-sizing:border-box;margin:0;padding:0}
.plan{font-family:var(--font-sans);padding:1rem 0}
.week-tabs{display:flex;gap:8px;margin-bottom:1.25rem;flex-wrap:wrap}
.wtab{padding:6px 14px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);font-size:13px;cursor:pointer;color:var(--color-text-secondary);background:var(--color-background-primary);transition:all .15s}
.wtab.active{background:var(--color-background-info);color:var(--color-text-info);border-color:var(--color-border-info);font-weight:500}
.week-label{font-size:12px;color:var(--color-text-secondary);margin-bottom:1rem;line-height:1.5}
.days{display:flex;flex-direction:column;gap:8px}
.day-card{border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);background:var(--color-background-primary);overflow:hidden}
.day-header{display:flex;align-items:center;gap:12px;padding:10px 14px;cursor:pointer;user-select:none}
.day-header:hover{background:var(--color-background-secondary)}
.day-num{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;flex-shrink:0}
.day-meta{flex:1}
.day-title{font-size:14px;font-weight:500;color:var(--color-text-primary)}
.day-sub{font-size:12px;color:var(--color-text-secondary);margin-top:1px}
.day-chevron{font-size:16px;color:var(--color-text-tertiary);transition:transform .2s}
.day-chevron.open{transform:rotate(180deg)}
.day-body{padding:0 14px 12px 54px;display:none}
.day-body.open{display:block}
.tasks{list-style:none;margin-bottom:10px}
.tasks li{font-size:13px;color:var(--color-text-secondary);padding:3px 0;display:flex;gap:8px;align-items:flex-start;line-height:1.5}
.tasks li::before{content:"";width:4px;height:4px;border-radius:50%;background:var(--color-border-secondary);margin-top:7px;flex-shrink:0}
.deliverable{font-size:12px;padding:6px 10px;border-radius:var(--border-radius-md);border-left:2px solid;margin-top:4px}
.progress-bar{height:4px;border-radius:2px;background:var(--color-background-secondary);margin-bottom:1.25rem;overflow:hidden}
.progress-fill{height:100%;border-radius:2px;transition:width .3s}
.legend{display:flex;gap:16px;margin-bottom:1rem;flex-wrap:wrap}
.leg{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--color-text-secondary)}
.leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
</style>

<div class="legend">

  <div class="leg"><div class="leg-dot" style="background:#0F6E56"></div>Backend / API</div>
  <div class="leg"><div class="leg-dot" style="background:#854F0B"></div>Dane / logika</div>
  <div class="leg"><div class="leg-dot" style="background:#534AB7"></div>Frontend</div>
  <div class="leg"><div class="leg-dot" style="background:#993C1D"></div>Deploy</div>
</div>

<div class="week-tabs">
  <button class="wtab active" onclick="showWeek(0)">Tydzień 1 — Backend</button>
  <button class="wtab" onclick="showWeek(1)">Tydzień 2 — Ceny i logika</button>
  <button class="wtab" onclick="showWeek(2)">Tydzień 3 — Frontend</button>
  <button class="wtab" onclick="showWeek(3)">Tydzień 4 — Import i deploy</button>

<div class="progress-bar"><div class="progress-fill" id="prog" style="width:25%;background:#185FA5"></div></div>

</div>

let currentWeek = 0;
let openDay = -1;

function showWeek(w){
  currentWeek = w;
  openDay = -1;
  document.querySelectorAll('.wtab').forEach((t,i)=>t.classList.toggle('active',i===w));
  const wk = weeks[w];
  document.getElementById('wlabel').textContent = wk.label;
  document.getElementById('prog').style.width = wk.progress;
  document.getElementById('prog').style.background = wk.color;
  renderDays();
}

function renderDays(){
  const wk = weeks[currentWeek];
  const container = document.getElementById('days-container');
  container.innerHTML = '';
  wk.days.forEach((d,i)=>{
    const isOpen = openDay === i;
    const card = document.createElement('div');
    card.className = 'day-card';
    const dayNum = i+1 + currentWeek*5;
    card.innerHTML = `
      <div class="day-header" onclick="toggleDay(${i})">
        <div class="day-num" style="background:${wk.delBg};color:${wk.color};border:0.5px solid ${wk.delBc}">D${dayNum}</div>
        <div class="day-meta">
          <div class="day-title">${d.name} — ${d.title}</div>
          <div class="day-sub">${d.sub}</div>
        </div>
        <i class="ti ti-chevron-down day-chevron${isOpen?' open':''}" aria-hidden="true"></i>
      </div>
      <div class="day-body${isOpen?' open':''}">
        <ul class="tasks">${d.tasks.map(t=>`<li>${t}</li>`).join('')}</ul>
        <div class="deliverable" style="background:${wk.delBg};border-color:${wk.delBc};color:${wk.delTc}">
          <strong>Na koniec dnia:</strong> ${d.del}
        </div>
      </div>`;
    container.appendChild(card);
  });
}

function toggleDay(i){
  openDay = openDay===i ? -1 : i;
  renderDays();
}

renderDays();
